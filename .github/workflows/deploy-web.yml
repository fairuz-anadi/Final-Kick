name: Deploy Web Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.7"

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binaries
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot-bin
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-stable

      - name: Download Godot ${{ env.GODOT_VERSION }} + export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin ~/.local/share/godot/export_templates
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip -d ~/godot-bin
          mv ~/godot-bin/Godot_v${GODOT_VERSION}-stable_linux.x86_64 ~/godot-bin/godot
          chmod +x ~/godot-bin/godot
          curl -sSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Import project (build asset cache)
        run: ~/godot-bin/godot --headless --path . --import || true

      - name: Export Web build
        run: |
          mkdir -p web-export
          ~/godot-bin/godot --headless --path . --export-release "Web" web-export/index.html
          test -f web-export/index.wasm

      - name: Deploy to Vercel
        working-directory: web-export
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
